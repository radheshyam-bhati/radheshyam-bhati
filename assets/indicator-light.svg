<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="28" height="28">
  <!-- Indicator light panel -->
  <rect x="5" y="10" width="50" height="40" rx="4" fill="#1A1D23" stroke="#8B7355" stroke-width="1"/>
  <!-- Amber light (active) -->
  <circle cx="18" cy="30" r="6" fill="#D45500"/>
  <circle cx="18" cy="30" r="10" fill="#D45500" opacity="0.15"/>
  <!-- Label -->
  <text x="18" y="46" font-family="monospace" font-size="5" fill="#C4A35A" text-anchor="middle" opacity="0.6">●</text>
  <!-- Unlit light -->
  <circle cx="42" cy="30" r="6" fill="#2A2F38" stroke="#8B7355" stroke-width="0.5"/>
  <text x="42" y="46" font-family="monospace" font-size="5" fill="#8B7355" text-anchor="middle" opacity="0.4">○</text>
</svg>
