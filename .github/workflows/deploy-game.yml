name: Deploy Switchboard Game to Pages
on:
  push:
    branches: [main]
    paths:
      - 'game/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy game to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./game
          destination_dir: ./game
          keep_files: false
          publish_branch: gh-pages

      - name: Update README with Pages URL
        run: |
          echo "Pages deployment triggered. Site will be available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/game/"
