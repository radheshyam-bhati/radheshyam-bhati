name: Switchboard Maintenance
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  maintain-switchboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update operator timestamp
        run: |
          # Use gsed (macOS) or sed (Linux) to update timestamp
          CURRENT_MONTH=$(date '+%B %Y')
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/Last updated.*/Last updated ${CURRENT_MONTH}/" README.md
          else
            sed -i "s/Last updated.*/Last updated ${CURRENT_MONTH}/" README.md
          fi
          echo "{\"last_maintenance\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\", \"operator\": \"Radheshyam Bhati\", \"station\": \"Jodhpur, India\"}" > assets/switchboard-state.json

      - name: Commit and push if changed
        run: |
          git config user.name "Switchboard Bot"
          git config user.email "bot@switchboard.workshop"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: switchboard maintenance [skip ci]"
            git push
          fi
