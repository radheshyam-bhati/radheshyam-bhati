name: Switchboard Maintenance
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  maintain-switchboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update operator timestamp
        run: |
          sed -i "s/Last updated.*/Last updated $(date '+%B %Y')/" README.md
          echo '{"last_maintenance": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'", "operator": "Radheshyam Bhati", "station": "Jodhpur, India"}' > assets/switchboard-state.json

      - name: Commit and push if changed
        run: |
          git config user.name "Switchboard Bot"
          git config user.email "bot@switchboard.workshop"
          git add -A
          git diff --staged --quiet || git commit -m "chore: switchboard maintenance [skip ci]"
          git push
