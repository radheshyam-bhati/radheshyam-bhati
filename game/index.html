<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0B0C;
    color: #E8D5B7;
    font-family: 'Courier New', Courier, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  .header {
    width: 100%;
    max-width: 900px;
    padding: 30px 20px 10px;
    text-align: center;
  }
  .header h1 {
    color: #C4A35A;
    font-size: 1.2em;
    letter-spacing: 6px;
    font-weight: normal;
    margin-bottom: 6px;
  }
  .header .subtitle {
    color: #8B7355;
    font-size: 0.75em;
    letter-spacing: 3px;
  }
  .header .status-bar {
    margin-top: 12px;
    padding: 6px 16px;
    border: 1px solid #2A2F38;
    border-radius: 4px;
    font-size: 0.7em;
    color: #8B7355;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header .status-bar .active { color: #D45500; }
  .header .status-bar .online { color: #00A86B; }

  /* ─── SWITCHBOARD PANEL ─── */
  .panel-wrapper {
    width: 100%;
    max-width: 900px;
    padding: 10px 20px;
    position: relative;
  }
  .panel {
    position: relative;
    background: linear-gradient(180deg, #1A1D23 0%, #0A0B0C 100%);
    border: 2px solid #2A2F38;
    border-radius: 12px;
    padding: 30px 20px;
    min-height: 500px;
    overflow: hidden;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #C4A35A, transparent);
    opacity: 0.3;
  }

  /* Decorative screw holes */
  .screw { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: #2A2F38; border: 1px solid #8B7355; }
  .screw::after { content: '—'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8px; color: #8B7355; }
  .screw.tl { top: 12px; left: 12px; }
  .screw.tr { top: 12px; right: 12px; }
  .screw.bl { bottom: 12px; left: 12px; }
  .screw.br { bottom: 12px; right: 12px; }

  /* Label plate */
  .panel-label {
    text-align: center;
    margin-bottom: 20px;
    padding: 8px;
    border-bottom: 1px solid #2A2F38;
  }
  .panel-label span {
    color: #8B7355;
    font-size: 0.65em;
    letter-spacing: 4px;
  }

  /* ─── SVG LAYER FOR CABLES ─── */
  #cable-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  #cable-svg path {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    opacity: 0.7;
    transition: opacity 0.3s;
  }

  /* ─── JACKS ─── */
  .jacks-container {
    position: relative;
    z-index: 2;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    padding: 10px 0;
  }

  .jack {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    width: 110px;
    padding: 10px 6px 8px;
    border-radius: 8px;
    border: 1px solid #2A2F38;
    background: rgba(26, 29, 35, 0.8);
    transition: all 0.25s ease;
    position: relative;
  }
  .jack:hover {
    border-color: #8B7355;
    background: rgba(42, 47, 56, 0.9);
    transform: translateY(-2px);
  }
  .jack:active { transform: translateY(0); }

  /* Jack socket */
  .jack-socket {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #0A0B0C;
    border: 2px solid #2A2F38;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    transition: all 0.3s;
    position: relative;
  }
  .jack-socket .inner {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #1A1D23;
    border: 1px solid #2A2F38;
    transition: all 0.3s;
  }
  .jack .port-num {
    font-size: 0.55em;
    color: #8B7355;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .jack .jack-name {
    font-size: 0.6em;
    color: #E8D5B7;
    text-align: center;
    line-height: 1.3;
    letter-spacing: 0.5px;
  }
  .jack .jack-tech {
    font-size: 0.5em;
    color: #5A4A35;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* ─── JACK LIVE STATS ─── */
  .jack-stats {
    display: flex;
    gap: 6px;
    margin-top: 3px;
    font-size: 0.45em;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .jack-stats.visible { opacity: 1; }
  .jack-stats .stat {
    padding: 1px 4px;
    border-radius: 2px;
    background: rgba(10, 11, 12, 0.6);
    border: 1px solid #2A2F38;
    white-space: nowrap;
  }
  .jack-stats .stat.stars { color: #C4A35A; }
  .jack-stats .stat.forks { color: #8B7355; }
  .jack-stats .stat.date { color: #5A4A35; }

  /* Loading shimmer */
  .jack.loading .jack-socket .inner { animation: shimmer 1s ease-in-out infinite; }
  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* Stats in status bar */
  .stat-badge {
    padding: 2px 6px;

  .stat-badge.repos { color: #D45500; border-color: #3A2015; }
  .stat-badge.followers { color: #4A90D9; border-color: #15203A; }

  .jack.idle .jack-socket { border-color: #2A2F38; }

  .jack.selected .jack-led { background: #D45500; box-shadow: 0 0 10px rgba(212,85,0,0.5); }
  .jack.selected .jack-socket { border-color: #D45500; }

let repoStats = {};
let statsLoaded = false;

function timeAgo(dateStr) {
  const now = new Date();
  const then = new Date(dateStr);
  const diffMs = now - then;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return 'today';
  if (diffDays === 1) return '1d ago';
  if (diffDays < 30) return `${diffDays}d ago`;
  const diffMonths = Math.floor(diffDays / 30);
  if (diffMonths === 1) return '1mo ago';
  if (diffMonths < 12) return `${diffMonths}mo ago`;
  const diffYears = Math.floor(diffMonths / 12);
  return `${diffYears}y ago`;
}

async function fetchRepoStats() {
  const statusEl = document.getElementById('status-text');
  statusEl.textContent = 'LOADING STATS...';

  try {
    const response = await fetch('https://api.github.com/users/radheshyam-bhati/repos?per_page=100&type=public&sort=updated', {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });

    if (!response.ok) {
      throw new Error(`GitHub API returned ${response.status}`);
    }

    const data = await response.json();
    let totalStars = 0;
    let totalForks = 0;

    data.forEach(repo => {
      repoStats[repo.name] = {
        stars: repo.stargazers_count || 0,
        forks: repo.forks_count || 0,
        pushed: repo.pushed_at || repo.updated_at || repo.created_at,
        language: repo.language || 'Unknown'
      };
      totalStars += repo.stargazers_count || 0;
      totalForks += repo.forks_count || 0;
    });

    // Update header stats
    document.getElementById('total-stars').textContent = `☆ ${totalStars}`;
    document.getElementById('total-repos').textContent = `○ ${data.length}`;
    document.getElementById('total-forks').textContent = `◉ ${totalForks}`;

    statsLoaded = true;
    updateJackStats();
    statusEl.textContent = 'READY — LIVE STATS';

  } catch (err) {
    console.warn('Failed to fetch GitHub stats:', err);
    statusEl.textContent = 'OFFLINE — USING STATIC DATA';
    // Provide fallback data so jacks still look complete
    projects.forEach(proj => {
      repoStats[proj.repo] = { stars: '—', forks: '—', pushed: null, language: null };
    });
    statsLoaded = true;
    updateJackStats();
  }
}

function updateJackStats() {
  projects.forEach(proj => {
    const jack = jackElements[proj.id];
    if (!jack) return;
    const statsContainer = jack.querySelector('.jack-stats');
    if (!statsContainer) return;

    const stats = repoStats[proj.repo];
    if (stats) {
      const starsEl = statsContainer.querySelector('.stat.stars');
      const forksEl = statsContainer.querySelector('.stat.forks');
      const dateEl = statsContainer.querySelector('.stat.date');

      if (starsEl) starsEl.textContent = `☆ ${stats.stars}`;
      if (forksEl) forksEl.textContent = `⑂ ${stats.forks}`;
      if (dateEl && stats.pushed) {
        dateEl.textContent = timeAgo(stats.pushed);
      } else if (dateEl) {
        dateEl.textContent = '—';
      }

      statsContainer.classList.add('visible');
      jack.classList.remove('loading');
    }
  });
}

// ─── WEB AUDIO API — TELEPHONE SOUNDS ───
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // Resume if suspended (browser autoplay policy)
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

function playRelayClick() {
  try {
    const ctx = getAudioContext();
    // Short click: 1kHz tone with fast decay
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(1000, ctx.currentTime);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.06);
  } catch (e) { /* Web Audio not available */ }
}

function playRelayClack() {
  try {
    const ctx = getAudioContext();
    // Heavier clack for connect/disconnect: noise burst
    const bufferSize = ctx.sampleRate * 0.08;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    noise.connect(gain);
    gain.connect(ctx.destination);
    noise.start(ctx.currentTime);
  } catch (e) { /* Web Audio not available */ }
}

function playRingtone() {
  try {
    const ctx = getAudioContext();
    const now = ctx.currentTime;

    // Classic Bell System ring: 440Hz + 480Hz mixed
    // Pattern: ring 0.4s, pause 0.2s, ring 0.4s
    const ringDuration = 0.4;
    const pauseDuration = 0.2;

    [0, ringDuration + pauseDuration].forEach(startOffset => {
      // Oscillator 1: 440Hz
      const osc1 = ctx.createOscillator();
      const gain1 = ctx.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(440, now + startOffset);
      gain1.gain.setValueAtTime(0.12, now + startOffset);
      gain1.gain.setValueAtTime(0.12, now + startOffset + ringDuration - 0.05);
      gain1.gain.exponentialRampToValueAtTime(0.001, now + startOffset + ringDuration);
      osc1.connect(gain1);
      gain1.connect(ctx.destination);
      osc1.start(now + startOffset);
      osc1.stop(now + startOffset + ringDuration);

      // Oscillator 2: 480Hz
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(480, now + startOffset);
      gain2.gain.setValueAtTime(0.10, now + startOffset);
      gain2.gain.setValueAtTime(0.10, now + startOffset + ringDuration - 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + startOffset + ringDuration);
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.start(now + startOffset);
      osc2.stop(now + startOffset + ringDuration);
    });
  } catch (e) { /* Web Audio not available */ }
}

// ─── STATE ───
let connections = [];
let selectedSource = null;
let jackElements = {};

// ─── RENDER JACKS ───
function renderJacks() {
  const container = document.getElementById('jacks-container');
  container.innerHTML = '';
  projects.forEach((proj, idx) => {
    const jack = document.createElement('div');
    jack.className = 'jack idle';
    jack.dataset.id = proj.id;
    jack.innerHTML = `
      <div class="port-num">L${idx + 1}</div>
      <div class="jack-socket"><div class="inner"></div></div>
      <div class="jack-name">${proj.name}</div>
      <div class="jack-tech">${proj.short}</div>
      <div class="jack-stats">
        <span class="stat stars">☆ —</span>
        <span class="stat forks">⑂ —</span>
        <span class="stat date">—</span>
      </div>
      <div class="jack-led"></div>
    `;
    jack.classList.add('loading');
    jack.addEventListener('click', () => handleJackClick(proj.id));
    container.appendChild(jack);
    jackElements[proj.id] = jack;
  });
}

// ─── SVG CABLE LAYER ───
function getJackCenter(id) {
  const jack = jackElements[id];
  if (!jack) return { x: 0, y: 0 };
  const panel = document.querySelector('.panel');
  const panelRect = panel.getBoundingClientRect();
  const jackRect = jack.getBoundingClientRect();
  return {
    x: jackRect.left - panelRect.left + jackRect.width / 2,
    y: jackRect.top - panelRect.top + jackRect.height / 2 - 10
  };
}

function renderCables() {
  const svg = document.getElementById('cable-svg');
  svg.innerHTML = '';
  connections.forEach((conn, idx) => {
    const from = getJackCenter(conn.from);
    const to = getJackCenter(conn.to);
    if (!from.x || !to.x) return;

    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const cx1 = from.x + dx * 0.4;
    const cy1 = from.y;
    const cx2 = from.x + dx * 0.6;
    const cy2 = to.y;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const projFrom = projects.find(p => p.id === conn.from);
    const strokeColor = projFrom ? projFrom.color : '#D45500';
    path.setAttribute('d', `M${from.x},${from.y} C${cx1},${cy1} ${cx2},${cy2} ${to.x},${to.y}`);
    path.setAttribute('stroke', strokeColor);
    path.style.animationDelay = `${idx * 0.15}s`;
    svg.appendChild(path);

    // Glow layer
    const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    glow.setAttribute('d', `M${from.x},${from.y} C${cx1},${cy1} ${cx2},${cy2} ${to.x},${to.y}`);
    glow.setAttribute('stroke', strokeColor);
    glow.setAttribute('stroke-width', '8');
    glow.setAttribute('opacity', '0.15');
    glow.setAttribute('filter', 'url(#blur)');
    svg.appendChild(glow);
  });

  // Add blur filter
  if (!document.querySelector('#cable-blur')) {
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.id = 'cable-blur';
    const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
    filter.id = 'blur';
    const blur = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
    blur.setAttribute('stdDeviation', '3');
    filter.appendChild(blur);
    defs.appendChild(filter);
    svg.prepend(defs);
  }
}

// ─── GAME LOGIC ───
function handleJackClick(id) {
  if (!selectedSource) {
    // Select source
    selectedSource = id;
    updateJackStates();
    playRelayClick();
    document.getElementById('status-text').textContent = 'SELECTING DESTINATION';
  } else if (selectedSource === id) {
    // Deselect
    selectedSource = null;
    updateJackStates();
    playRelayClick();
    document.getElementById('status-text').textContent = 'AWAITING INPUT';
  } else {
    // Check if already connected
    const already = connections.find(c =>
      (c.from === selectedSource && c.to === id) ||
      (c.from === id && c.to === selectedSource)
    );
    if (already) {
      // Disconnect
      connections = connections.filter(c => c !== already);
      playRelayClack();
    } else {
      // Connect
      connections.push({ from: selectedSource, to: id });
      showConnectionInfo(selectedSource, id);
      playRingtone();
      playRelayClack();
    }
    selectedSource = null;
    updateJackStates();
    document.getElementById('status-text').textContent = 'CONNECTED';
    setTimeout(() => {
      if (!selectedSource) document.getElementById('status-text').textContent = 'AWAITING INPUT';
    }, 1500);
  }
  updateLineCount();
}

function updateJackStates() {
  projects.forEach(proj => {
    const jack = jackElements[proj.id];
    if (!jack) return;
    jack.classList.remove('idle', 'selected', 'connected', 'destination');

    const isConnected = connections.some(c => c.from === proj.id || c.to === proj.id);
    const isSelected = selectedSource === proj.id;

    if (isSelected) {
      jack.classList.add('selected');
    } else if (isConnected) {
      jack.classList.add('connected');
    } else if (selectedSource && selectedSource !== proj.id) {
      const already = connections.some(c =>
        (c.from === selectedSource && c.to === proj.id) ||
        (c.from === proj.id && c.to === selectedSource)
      );
      if (!already) {
        jack.classList.add('destination');
      } else {
        jack.classList.add('idle');
      }
    } else {
      jack.classList.add('idle');
    }
  });
  renderCables();
}

function showConnectionInfo(id1, id2) {
  const info = getConnectionInfo(id1, id2);
  const panel = document.getElementById('info-panel');
  const proj1 = projects.find(p => p.id === id1);
  const proj2 = projects.find(p => p.id === id2);
  panel.innerHTML = `
    <div class="info-label">⬟ NEW CONNECTION: ${proj1.name} ↔ ${proj2.name}</div>
    <div class="info-title">${info.title}</div>
    <div class="info-desc">${info.desc}</div>
    <div class="info-tech">⚡ ${info.tech}</div>
  `;
}

function updateLineCount() {
  document.getElementById('line-count').textContent = connections.length;
}

function clearAllConnections() {
  connections = [];
  selectedSource = null;
  updateJackStates();
  document.getElementById('info-panel').innerHTML = `
    <div class="info-label">⬟ LAST CONNECTION</div>
    <div class="info-empty">All lines cleared. Select a source jack to begin.</div>
  `;
  document.getElementById('status-text').textContent = 'CLEARED';
  playRelayClack();
  updateLineCount();
}

function randomConnection() {
  // Pick two different projects that aren't already connected
  const available = [];
  for (let i = 0; i < projects.length; i++) {
    for (let j = i + 1; j < projects.length; j++) {
      const exists = connections.some(c =>
        (c.from === projects[i].id && c.to === projects[j].id) ||
        (c.from === projects[j].id && c.to === projects[i].id)
      );
      if (!exists) available.push({ from: projects[i].id, to: projects[j].id });
    }
  }
  if (available.length === 0) {
    document.getElementById('status-text').textContent = 'ALL CONNECTED';
    return;
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  connections.push(pick);
  showConnectionInfo(pick.from, pick.to);
  selectedSource = null;
  updateJackStates();
  document.getElementById('status-text').textContent = 'RANDOM CONNECTED';
  updateLineCount();
}

function resetAll() {
  connections = [];
  selectedSource = null;
  updateJackStates();
  document.getElementById('info-panel').innerHTML = `
    <div class="info-label">⬟ LAST CONNECTION</div>
    <div class="info-empty">Switchboard reset. Click a source jack to begin.</div>
  `;
  document.getElementById('status-text').textContent = 'RESET';
  playRelayClack();
  updateLineCount();
}

// ─── RESIZE HANDLER ───
window.addEventListener('resize', () => { renderCables(); });

// ─── INIT ───
renderJacks();
document.getElementById('status-text').textContent = 'LOADING...';

// Fetch live stats on page load
fetchRepoStats();
</script>
